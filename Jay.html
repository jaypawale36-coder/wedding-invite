<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay & Snehal Wedding Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f2;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            perspective: 1500px;
        }

        /* Main Container */
        .invitation {
            position: relative;
            width: 800px;
            height: 500px;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* The Inside of the Card */
        .inside {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .inside-content h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin: 0 0 20px 0;
            color: #333;
        }

        .inside-content p {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #555;
            line-height: 1.8;
            margin: 10px 0;
        }

        /* The Flaps */
        .flap {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #fff;
            transition: transform 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
            transform-origin: left;
            z-index: 2;
            border-right: 1px solid #eaeaea;
            box-sizing: border-box;
        }

        .flap.right {
            right: 0;
            transform-origin: right;
            border-right: none;
            border-left: 1px solid #eaeaea;
        }

        /* Hover Effect to Open the Card */
        .invitation:hover .flap.left {
            transform: rotateY(-130deg);
        }
        .invitation:hover .flap.right {
            transform: rotateY(130deg);
        }
        
        /* The Royal Seal Hover Animation */
        .invitation:hover .seal {
            transform: translate(-50%, -50%) scale(1.4) rotate(180deg);
            opacity: 0;
            transition: all 0.6s ease-in-out;
            pointer-events: none;
        }

        /* Left Flap Content (Typography) */
        .left-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
        }

        .title {
            font-family: 'Anton', sans-serif;
            font-size: 4.5rem;
            line-height: 1;
            letter-spacing: 2px;
            color: #222;
        }

        .date-section {
            margin-top: 30px;
        }

        .on-text {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            display: block;
            margin-bottom: -10px;
        }

        .big-date {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            line-height: 1;
            float: left;
            margin-right: 10px;
        }

        .month-year {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding-top: 10px;
            display: inline-block;
        }

        .names-bottom {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #333;
        }

        /* Right Flap Content (Photo) */
        .right-content {
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background-color: #ddd;
            /* Update 'couple.jpg' to your actual image file name! */
            background-image: url('couple.jpeg');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%);
        }

        /* The Royal Golden Seal */
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(ellipse farthest-corner at right bottom, #FEDB37 0%, #FDB931 8%, #9f7928 30%, #8A6E2F 40%, transparent 80%),
                        radial-gradient(ellipse farthest-corner at left top, #FFFFFF 0%, #FFFFAC 8%, #D1B464 25%, #5d4a1f 62.5%, #5d4a1f 100%);
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #fff;
            transition: all 0.5s ease;
        }

        /* The Monogram Inside the Seal */
        .monogram {
            font-family: 'Great Vibes', cursive;
            color: #222;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="invitation">
        
        <div class="inside">
            <div class="inside-content">
                <p>Together with their families</p>
                <h2>Jay & Snehal</h2>
                <p>Joyfully invite you to share in their happiness<br>as they tie the knot.</p>
                <p><strong>Sunday, 19th April 2026</strong><br>Belgaum, Karnataka</p>
            </div>
        </div>

        <div class="flap left">
            <div class="left-content">
                <div class="title">WED<br>DING</div>
                <div class="date-section">
                    <span class="on-text">On</span>
                    <span class="big-date">19</span>
                    <span class="month-year">APRIL 2026<br>SUNDAY</span>
                </div>
                <div class="names-bottom">Jay & Snehal</div>
            </div>
        </div>

        <div class="flap right">
            <div class="right-content">
                <div class="photo-placeholder"></div>
            </div>
        </div>

        <div class="seal">
            <span class="monogram">J&S</span>
        </div>

    </div>

</body>
</html>
